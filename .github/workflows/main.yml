name: Build Simple SMS Backup (No Server)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/simple/smsbackup
          mkdir -p app/src/main/res/values

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.simple.smsbackup">
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application android:allowBackup="true" android:label="SMS Backup"
                  android:theme="@android:style/Theme.DeviceDefault.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java (hanya backup)
        run: |
          cat > app/src/main/java/com/simple/smsbackup/MainActivity.java << 'EOF'
          package com.simple.smsbackup;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.widget.*;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.io.*;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          public class MainActivity extends AppCompatActivity {
              private static final int PERMISSION_REQUEST_CODE = 123;
              private Button backupButton;
              private TextView statusText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(50, 50, 50, 50);
                  statusText = new TextView(this);
                  statusText.setText("Tekan tombol untuk backup SMS ke XML");
                  backupButton = new Button(this);
                  backupButton.setText("Backup SMS ke XML");
                  backupButton.setOnClickListener(v -> doBackup());
                  layout.addView(statusText);
                  layout.addView(backupButton);
                  setContentView(layout);
                  checkPermissions();
              }
              private void checkPermissions() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_SMS) != PackageManager.PERMISSION_GRANTED ||
                      ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.READ_SMS, Manifest.permission.WRITE_EXTERNAL_STORAGE},
                          PERMISSION_REQUEST_CODE);
                  }
              }
              @Override
              public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          Toast.makeText(this, "Izin diberikan", Toast.LENGTH_SHORT).show();
                      } else {
                          Toast.makeText(this, "Izin SMS diperlukan", Toast.LENGTH_LONG).show();
                      }
                  }
              }
              private void doBackup() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_SMS) != PackageManager.PERMISSION_GRANTED) {
                      Toast.makeText(this, "Tidak ada izin baca SMS", Toast.LENGTH_LONG).show();
                      return;
                  }
                  StringBuilder sb = new StringBuilder();
                  sb.append("<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n");
                  sb.append("<smses>\n");
                  // Baca inbox
                  Uri inboxUri = Uri.parse("content://sms/inbox");
                  Cursor c = getContentResolver().query(inboxUri, null, null, null, "date ASC");
                  if (c != null) {
                      int idxAddress = c.getColumnIndex("address");
                      int idxBody = c.getColumnIndex("body");
                      int idxDate = c.getColumnIndex("date");
                      while (c.moveToNext()) {
                          String address = (idxAddress >= 0) ? c.getString(idxAddress) : "";
                          String body = (idxBody >= 0) ? c.getString(idxBody) : "";
                          long date = (idxDate >= 0) ? c.getLong(idxDate) : 0;
                          sb.append("  <sms type=\"inbox\" address=\"")
                            .append(escapeXml(address))
                            .append("\" date=\"")
                            .append(date)
                            .append("\">")
                            .append(escapeXml(body))
                            .append("</sms>\n");
                      }
                      c.close();
                  }
                  // Baca sent
                  Uri sentUri = Uri.parse("content://sms/sent");
                  c = getContentResolver().query(sentUri, null, null, null, "date ASC");
                  if (c != null) {
                      int idxAddress = c.getColumnIndex("address");
                      int idxBody = c.getColumnIndex("body");
                      int idxDate = c.getColumnIndex("date");
                      while (c.moveToNext()) {
                          String address = (idxAddress >= 0) ? c.getString(idxAddress) : "";
                          String body = (idxBody >= 0) ? c.getString(idxBody) : "";
                          long date = (idxDate >= 0) ? c.getLong(idxDate) : 0;
                          sb.append("  <sms type=\"sent\" address=\"")
                            .append(escapeXml(address))
                            .append("\" date=\"")
                            .append(date)
                            .append("\">")
                            .append(escapeXml(body))
                            .append("</sms>\n");
                      }
                      c.close();
                  }
                  sb.append("</smses>");
                  // Simpan ke file
                  String filename = "sms_backup_" + new SimpleDateFormat("yyyyMMdd_HHmmss", Locale.US).format(new Date()) + ".xml";
                  File dir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                  if (!dir.exists()) dir.mkdirs();
                  File file = new File(dir, filename);
                  try (FileWriter fw = new FileWriter(file)) {
                      fw.write(sb.toString());
                      statusText.setText("Backup berhasil: " + filename);
                      Toast.makeText(this, "File tersimpan di Downloads/" + filename, Toast.LENGTH_LONG).show();
                  } catch (IOException e) {
                      statusText.setText("Error: " + e.getMessage());
                      Toast.makeText(this, "Gagal menyimpan file", Toast.LENGTH_LONG).show();
                      e.printStackTrace();
                  }
              }
              private String escapeXml(String s) {
                  if (s == null) return "";
                  return s.replace("&", "&amp;")
                          .replace("<", "&lt;")
                          .replace(">", "&gt;")
                          .replace("\"", "&quot;")
                          .replace("'", "&apos;");
              }
          }
          EOF

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SMS Backup</string>
          </resources>
          EOF

      - name: Write project build.gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Write settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Write app/build.gradle (targetSdk 22 untuk kompatibilitas)
        run: |
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.simple.smsbackup'
              compileSdk 33
              defaultConfig {
                  applicationId "com.simple.smsbackup"
                  minSdk 21
                  targetSdk 22
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { debug { debuggable true } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-backup-simple
          path: app/build/outputs/apk/debug/*.apk
