name: Build Ultra Simple SMS Backup

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/simple/smsbackup
          mkdir -p app/src/main/res/values

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.simple.smsbackup">
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application android:allowBackup="true" android:label="SMS Backup"
                  android:theme="@android:style/Theme.DeviceDefault.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java (pure Activity, auto backup, error log)
        run: |
          cat > app/src/main/java/com/simple/smsbackup/MainActivity.java << 'EOF'
          package com.simple.smsbackup;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Environment;
          import android.widget.TextView;
          import android.widget.LinearLayout;
          import android.database.Cursor;
          import android.net.Uri;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.widget.Toast;
          import java.io.File;
          import java.io.FileWriter;
          import java.io.IOException;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          public class MainActivity extends Activity {
              private TextView statusText;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(50,50,50,50);
                  statusText = new TextView(this);
                  statusText.setText("Memulai backup...");
                  layout.addView(statusText);
                  setContentView(layout);
                  // Cek izin
                  if (checkSelfPermission(Manifest.permission.READ_SMS) != PackageManager.PERMISSION_GRANTED ||
                      checkSelfPermission(Manifest.permission.WRITE_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.READ_SMS, Manifest.permission.WRITE_EXTERNAL_STORAGE}, 1);
                  } else {
                      doBackup();
                  }
              }
              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  if (requestCode == 1) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          doBackup();
                      } else {
                          statusText.setText("Izin ditolak. Tidak bisa backup SMS.");
                      }
                  }
              }
              private void doBackup() {
                  try {
                      StringBuilder sb = new StringBuilder();
                      sb.append("<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n");
                      sb.append("<smses>\n");
                      // Inbox
                      Cursor c = getContentResolver().query(Uri.parse("content://sms/inbox"), null, null, null, "date ASC");
                      if (c != null) {
                          int addrIdx = c.getColumnIndex("address");
                          int bodyIdx = c.getColumnIndex("body");
                          int dateIdx = c.getColumnIndex("date");
                          while (c.moveToNext()) {
                              String addr = (addrIdx >=0) ? c.getString(addrIdx) : "";
                              String body = (bodyIdx >=0) ? c.getString(bodyIdx) : "";
                              long date = (dateIdx >=0) ? c.getLong(dateIdx) : 0;
                              sb.append("  <sms type=\"inbox\" address=\"").append(escapeXml(addr))
                                .append("\" date=\"").append(date).append("\">")
                                .append(escapeXml(body)).append("</sms>\n");
                          }
                          c.close();
                      }
                      // Sent
                      c = getContentResolver().query(Uri.parse("content://sms/sent"), null, null, null, "date ASC");
                      if (c != null) {
                          int addrIdx = c.getColumnIndex("address");
                          int bodyIdx = c.getColumnIndex("body");
                          int dateIdx = c.getColumnIndex("date");
                          while (c.moveToNext()) {
                              String addr = (addrIdx >=0) ? c.getString(addrIdx) : "";
                              String body = (bodyIdx >=0) ? c.getString(bodyIdx) : "";
                              long date = (dateIdx >=0) ? c.getLong(dateIdx) : 0;
                              sb.append("  <sms type=\"sent\" address=\"").append(escapeXml(addr))
                                .append("\" date=\"").append(date).append("\">")
                                .append(escapeXml(body)).append("</sms>\n");
                          }
                          c.close();
                      }
                      sb.append("</smses>");
                      String filename = "sms_backup_" + new SimpleDateFormat("yyyyMMdd_HHmmss", Locale.US).format(new Date()) + ".xml";
                      File dir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                      if (!dir.exists()) dir.mkdirs();
                      File file = new File(dir, filename);
                      FileWriter fw = new FileWriter(file);
                      fw.write(sb.toString());
                      fw.close();
                      statusText.setText("Backup berhasil! File: " + filename);
                      Toast.makeText(this, "Backup sukses di Downloads", Toast.LENGTH_LONG).show();
                  } catch (Exception e) {
                      statusText.setText("Error: " + e.toString());
                      // Tulis error ke file
                      try {
                          File errFile = new File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), "sms_backup_error.txt");
                          FileWriter fw = new FileWriter(errFile);
                          fw.write("Error: " + e.toString() + "\n");
                          for (StackTraceElement ste : e.getStackTrace()) {
                              fw.write(ste.toString() + "\n");
                          }
                          fw.close();
                      } catch (Exception ex) {}
                  }
              }
              private String escapeXml(String s) {
                  if (s == null) return "";
                  return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;").replace("\"", "&quot;").replace("'", "&apos;");
              }
          }
          EOF

      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SMS Backup</string>
          </resources>
          EOF

      - name: Write project build.gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Write settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Write app/build.gradle (no extra deps)
        run: |
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.simple.smsbackup'
              compileSdk 33
              defaultConfig {
                  applicationId "com.simple.smsbackup"
                  minSdk 21
                  targetSdk 22
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { debug { debuggable true } }
          }
          dependencies {
              // no dependencies
          }
          EOF

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-backup-ultra-simple
          path: app/build/outputs/apk/debug/*.apk
